<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Reviews Test</title>
<style>
body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; }
.log { background: #f4f4f4; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 12px 0; font-family: monospace; font-size: 14px; white-space: pre-wrap; word-break: break-all; }
.ok { border-color: #4caf50; background: #e8f5e9; }
.err { border-color: #f44336; background: #ffebee; }
.warn { border-color: #ff9800; background: #fff3e0; }
h1 { font-size: 1.5rem; }
h2 { font-size: 1.2rem; margin-top: 32px; }
</style>
</head>
<body>
<h1>Google Reviews Debug Test</h1>
<p>Testet beide API-Methoden: alt (PlacesService) und neu (Place class).</p>
<div id="output"></div>

<div id="map" style="display:none;"></div>

<script>
var out = document.getElementById('output');
function log(msg, type) {
  var d = document.createElement('div');
  d.className = 'log ' + (type || '');
  d.textContent = msg;
  out.appendChild(d);
}
function logHtml(msg, type) {
  var d = document.createElement('div');
  d.className = 'log ' + (type || '');
  d.innerHTML = msg;
  out.appendChild(d);
}
function heading(text) {
  var h = document.createElement('h2');
  h.textContent = text;
  out.appendChild(h);
}

var API_KEY = 'AIzaSyCxSjk8YJg0bUVPE_UIsEz8SEZ1JFPi0aA';
var PLACE_ID = 'ChIJvz2kcMkvvkcRQhVG0xRW3gc';

log('API Key: ' + API_KEY.substring(0, 15) + '...');
log('Place ID: ' + PLACE_ID);
</script>

<script>
function initMap() {
  log('Google Maps JS API geladen (Version: ' + (google.maps.version || '?') + ')', 'ok');

  // ============ TEST 1: OLD PlacesService ============
  heading('Test 1: Alte PlacesService (getDetails)');
  log('Starte PlacesService.getDetails()...');

  try {
    var map = new google.maps.Map(document.getElementById('map'));
    var service = new google.maps.places.PlacesService(map);

    service.getDetails({
      placeId: PLACE_ID,
      fields: ['name', 'rating', 'user_ratings_total', 'reviews', 'url']
    }, function(place, status) {
      if (status === 'OK' && place) {
        log('FUNKTIONIERT! PlacesService liefert Daten.', 'ok');
        log('Name: ' + place.name);
        log('Rating: ' + place.rating + ' (' + place.user_ratings_total + ' Bewertungen)');
        if (place.reviews && place.reviews.length > 0) {
          log(place.reviews.length + ' Reviews geladen:');
          place.reviews.forEach(function(r, i) {
            log('  ' + (i+1) + '. ' + r.author_name + ' - ' + r.rating + ' Sterne: "' + (r.text || '').substring(0, 80) + '..."');
          });
        }
        logHtml('<strong style="color:green;">LOESUNG: PlacesService funktioniert noch! Wir koennen diese Methode verwenden.</strong>', 'ok');
      } else {
        log('FEHLER: Status = ' + status, 'err');
        if (status === 'REQUEST_DENIED') {
          log('REQUEST_DENIED bedeutet: API Key wird abgelehnt fuer diese API.', 'err');
        }
      }

      // ============ TEST 2: NEW Place class ============
      heading('Test 2: Neue Place class (fetchFields)');
      log('Starte Place.fetchFields()...');
      testNewApi();
    });
  } catch (e) {
    log('PlacesService Fehler: ' + e.message, 'err');
    heading('Test 2: Neue Place class (fetchFields)');
    log('Starte Place.fetchFields()...');
    testNewApi();
  }

  async function testNewApi() {
    try {
      var { Place } = await google.maps.importLibrary('places');
      var place = new Place({ id: PLACE_ID });
      await place.fetchFields({ fields: ['displayName', 'rating', 'userRatingCount', 'reviews'] });
      log('FUNKTIONIERT! fetchFields liefert Daten.', 'ok');
      log('Name: ' + (place.displayName || '?'));
      log('Rating: ' + place.rating + ' (' + place.userRatingCount + ' Bewertungen)');
      var reviews = place.reviews || [];
      log(reviews.length + ' Reviews geladen.');
      logHtml('<strong style="color:green;">LOESUNG: Neue API funktioniert auch!</strong>', 'ok');
    } catch (e) {
      log('FEHLER: ' + e.message, 'err');
      log('Error code: ' + (e.code || 'keiner'), 'err');
    }

    // ============ ZUSAMMENFASSUNG ============
    heading('Zusammenfassung');
    log('Falls Test 1 (alt) funktioniert: Wir verwenden einfach die alte Methode.');
    log('Falls beide fehlschlagen: Problem liegt beim API Key oder Projekt-Einstellungen.');
  }
}
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCxSjk8YJg0bUVPE_UIsEz8SEZ1JFPi0aA&libraries=places&callback=initMap" async defer></script>
</body>
</html>
