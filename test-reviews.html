<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Reviews Test</title>
<style>
body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; }
.input-area { background: #f0f0f0; border-radius: 12px; padding: 24px; margin: 20px 0; }
.input-area label { font-weight: 600; display: block; margin-bottom: 8px; }
.input-area input { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ccc; border-radius: 8px; font-family: monospace; box-sizing: border-box; }
.btn { margin-top: 12px; padding: 12px 24px; font-size: 16px; font-weight: 600; color: white; border: none; border-radius: 8px; cursor: pointer; margin-right: 8px; }
.btn-green { background: #4caf50; }
.btn-green:hover { background: #388e3c; }
.btn-blue { background: #2196f3; }
.btn-blue:hover { background: #1565c0; }
.btn-orange { background: #ff9800; }
.btn-orange:hover { background: #e65100; }
.log { background: #f4f4f4; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 12px 0; font-family: monospace; font-size: 14px; white-space: pre-wrap; word-break: break-all; }
.ok { border-color: #4caf50; background: #e8f5e9; }
.err { border-color: #f44336; background: #ffebee; }
.warn { border-color: #ff9800; background: #fff3e0; }
.review-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 8px 0; }
.review-card .stars { color: #f9ab00; font-size: 18px; }
.review-card .author { font-weight: 600; margin-bottom: 4px; }
.review-card .text { color: #333; font-size: 14px; line-height: 1.5; }
h2 { font-size: 1.2rem; margin-top: 32px; }
</style>
</head>
<body>
<h1>Google Reviews Test</h1>

<div class="input-area">
  <label>Google Maps API Key:</label>
  <input type="text" id="apiKeyInput" value="AIzaSyBwQdYtdx4n6EusXzZnKoi3Qln3eU316gw">
  <br>
  <label style="margin-top:12px;">Place ID:</label>
  <input type="text" id="placeIdInput" value="ChIJvz2kcMkvvkcRQhVG0xRW3gc">
  <br>
  <button class="btn btn-blue" onclick="testREST()">Test 1: REST API (direkt)</button>
  <button class="btn btn-green" onclick="testJSSDK()">Test 2: JS SDK (fetchFields)</button>
  <button class="btn btn-orange" onclick="testNewKey()">Neuen Key erstellen + testen</button>
</div>

<div id="output"></div>

<script>
var out = document.getElementById('output');
function clearOutput() { out.innerHTML = ''; }
function log(msg, type) {
  var d = document.createElement('div');
  d.className = 'log ' + (type || '');
  d.textContent = msg;
  out.appendChild(d);
}
function heading(text) {
  var h = document.createElement('h2');
  h.textContent = text;
  out.appendChild(h);
}

// ========== TEST 1: REST API (bypasses Maps JS SDK completely) ==========
async function testREST() {
  clearOutput();
  var apiKey = document.getElementById('apiKeyInput').value.trim();
  var placeId = document.getElementById('placeIdInput').value.trim();

  heading('Test 1: Places API (New) REST Endpoint');
  log('Testet den API Key DIREKT gegen die REST API, ohne Maps JS SDK.');
  log('API Key: ' + apiKey.substring(0, 15) + '...');
  log('Place ID: ' + placeId);
  log('');
  log('Sende Request an places.googleapis.com...');

  try {
    var url = 'https://places.googleapis.com/v1/places/' + placeId;
    var response = await fetch(url, {
      method: 'GET',
      headers: {
        'X-Goog-Api-Key': apiKey,
        'X-Goog-FieldMask': 'displayName,rating,userRatingCount,reviews,googleMapsUri'
      }
    });

    var data = await response.json();
    log('HTTP Status: ' + response.status, response.ok ? 'ok' : 'err');
    log('Response: ' + JSON.stringify(data, null, 2), response.ok ? 'ok' : 'err');

    if (response.ok && data.displayName) {
      heading('ERFOLG! Reviews geladen:');
      log('Name: ' + (data.displayName.text || data.displayName), 'ok');
      log('Rating: ' + data.rating, 'ok');
      log('Bewertungen: ' + data.userRatingCount, 'ok');
      if (data.reviews) {
        data.reviews.forEach(function(r) {
          var card = document.createElement('div');
          card.className = 'review-card';
          var stars = '';
          for (var i = 0; i < 5; i++) stars += i < r.rating ? '\u2605' : '\u2606';
          card.innerHTML = '<div class="stars">' + stars + '</div>'
            + '<div class="author">' + (r.authorAttribution?.displayName || '?') + '</div>'
            + '<div class="text">' + (r.text?.text || '') + '</div>';
          out.appendChild(card);
        });
      }
      log('');
      log('REST API funktioniert! Jetzt Test 2 (JS SDK) probieren.', 'ok');
    } else {
      log('');
      if (data.error) {
        log('Fehler-Code: ' + data.error.code, 'err');
        log('Fehler-Status: ' + data.error.status, 'err');
        log('Fehler-Nachricht: ' + data.error.message, 'err');
      }
      if (response.status === 403) {
        log('403 = API Key hat keinen Zugriff. Moeglich: falsches Projekt, Billing-Problem, oder Key deaktiviert.', 'err');
      }
      if (response.status === 400) {
        log('400 = Ungueltige Anfrage. Moeglich: Place ID falsch.', 'err');
      }
    }
  } catch (e) {
    log('Fehler: ' + e.message, 'err');
    if (e.message.includes('CORS') || e.message.includes('NetworkError') || e.message.includes('Failed to fetch')) {
      log('CORS blockiert den Request. Das ist normal bei Browser-Anfragen.', 'warn');
      log('Aber: Die JS SDK Methode (Test 2) umgeht CORS. Probier Test 2.', 'warn');
    }
  }
}

// ========== TEST 2: JS SDK (fetchFields) ==========
function testJSSDK() {
  clearOutput();
  var apiKey = document.getElementById('apiKeyInput').value.trim();
  var placeId = document.getElementById('placeIdInput').value.trim();

  heading('Test 2: Maps JS SDK + fetchFields');
  log('API Key: ' + apiKey.substring(0, 15) + '...');
  log('Place ID: ' + placeId);
  log('Lade Google Maps JS API...');

  // Error handlers
  window.gm_authFailure = function() {
    log('gm_authFailure! Maps JS API lehnt den Key ab.', 'err');
    log('Maps JavaScript API ist nicht aktiviert ODER Billing fehlt.', 'err');
  };

  // Remove old script
  var old = document.getElementById('gm-script');
  if (old) old.remove();

  window.__cb = function() {
    log('Maps JS API geladen (v' + (google.maps.version || '?') + ')', 'ok');
    runFetchFields(placeId);
  };

  var s = document.createElement('script');
  s.id = 'gm-script';
  s.src = 'https://maps.googleapis.com/maps/api/js?key=' + apiKey + '&libraries=places&callback=__cb';
  s.onerror = function() { log('Script-Ladefehler', 'err'); };
  document.body.appendChild(s);

  setTimeout(function() {
    if (!document.querySelector('.ok')) {
      log('TIMEOUT nach 10s', 'err');
    }
  }, 10000);
}

async function runFetchFields(placeId) {
  try {
    var { Place } = await google.maps.importLibrary('places');
    log('Place class geladen.', 'ok');
    var place = new Place({ id: placeId });
    log('Rufe fetchFields() auf...');
    await place.fetchFields({
      fields: ['displayName', 'rating', 'userRatingCount', 'reviews', 'googleMapsURI']
    });
    log('ERFOLG!', 'ok');
    log('Name: ' + place.displayName, 'ok');
    log('Rating: ' + place.rating + ' (' + place.userRatingCount + ' Bewertungen)', 'ok');
    if (place.reviews) {
      heading('Reviews:');
      place.reviews.forEach(function(r) {
        var card = document.createElement('div');
        card.className = 'review-card';
        var stars = '';
        var rating = r.rating || 0;
        for (var i = 0; i < 5; i++) stars += i < rating ? '\u2605' : '\u2606';
        card.innerHTML = '<div class="stars">' + stars + '</div>'
          + '<div class="author">' + (r.authorAttribution?.displayName || '?') + '</div>'
          + '<div class="text">' + (r.text || '') + '</div>';
        out.appendChild(card);
      });
    }
  } catch (e) {
    log('FEHLER: ' + e.message, 'err');
    if (e.code) log('Code: ' + e.code, 'err');
  }
}

// ========== NEUEN KEY ERSTELLEN ==========
function testNewKey() {
  clearOutput();
  heading('Neuen API Key erstellen');
  log('1. Oeffne: console.cloud.google.com/apis/credentials', 'warn');
  log('2. Klick: "+ Anmeldedaten erstellen" > "API-Schluessel"', 'warn');
  log('3. Kopiere den neuen Key', 'warn');
  log('4. Paste ihn oben in das Feld', 'warn');
  log('5. Klick "Test 1: REST API"', 'warn');
  log('');
  log('Falls es mit dem neuen Key geht, ersetzen wir ihn in der Website.', 'warn');
}
</script>
</body>
</html>
